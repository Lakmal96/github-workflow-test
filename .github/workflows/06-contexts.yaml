name: 06 - Contexts
run-name: o0 - Contexts | DEBUG - ${{inputs.debug}}

on:
  push:
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        default: false

jobs:
  echo-data:
    runs-on: ubuntu-latest
    steps:
      - name: Display Inormation
        run: |
          echo "Event Name: ${{github.event_name}}"
          echo "Ref: ${{github.ref}}"
          echo "SHA: ${{github.sha}}"
          echo "Actor: ${{github.actor}}"
          echo "Workflow: ${{github.workflow}}"
          echo "Run ID: ${{github.run_id}}"
          echo "Run Number: ${{github.run_number}}"
      - name: Retriew Variable
        run: |
          echo "Variable Value: ${{vars.MY_VAR}}"
